{{- $cfg := .Values.istio_monitoring | default dict -}}
{{- if $cfg.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ztunnel
  namespace: {{ $cfg.namespace }}
spec:
  selector:
    matchLabels:
      app: ztunnel
  namespaceSelector:
    matchNames:
      - {{ $cfg.namespace }}
  podMetricsEndpoints:
    - port: ztunnel-stats
      path: /stats/prometheus
      interval: 30s
{{- end }}
