{{- $cfg := .Values.istio_monitoring | default dict -}}
{{- if $cfg.enabled | default true }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istiod
  namespace: {{ $cfg.namespace | default "istio-system" }}
spec:
  selector:
    matchLabels:
      app: istiod
  namespaceSelector:
    matchNames:
      - {{ $cfg.namespace | default "istio-system" }}
  podMetricsEndpoints:
    - port: http-monitoring
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: ztunnel
  namespace: {{ $cfg.namespace | default "istio-system" }}
spec:
  selector:
    matchLabels:
      app: ztunnel
  namespaceSelector:
    matchNames:
      - {{ $cfg.namespace | default "istio-system" }}
  podMetricsEndpoints:
    - port: ztunnel-stats
      path: /stats/prometheus
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-gateway
  namespace: istio-ingress
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: istio-gateway
  namespaceSelector:
    matchNames:
      - istio-ingress
  podMetricsEndpoints:
    - port: http-envoy-prom
      path: /stats/prometheus
      interval: 30s
{{- end }}
