{{- if .Values.gateway_config }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.gateway_config.name | default "istio-gateway" }}-http-redirect
spec:
  parentRefs:
    - name: {{ .Values.gateway_config.name | default "istio-gateway" }}
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
